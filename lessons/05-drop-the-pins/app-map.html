<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drop the pins</title>

  <!-- Leaflet: a map library other people wrote. We "borrow" it with these two lines —
       a stylesheet and a script — straight from the internet. No install. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 56rem; margin: 2rem auto; padding: 0 1rem;
      line-height: 1.5; color: #1c2733; background: #faf7f0;
    }
    h1 { font-size: 1.4rem; color: #2A4A6B; }
    .heads-up { color: #6b5b40; }
    .row { display: flex; gap: .5rem; margin: 1.25rem 0; }
    input {
      flex: 1; padding: .5rem .6rem; font-size: 1rem;
      border: 1px solid #c9bfa8; border-radius: .4rem;
    }
    button {
      padding: .5rem .9rem; font-size: 1rem; cursor: pointer;
      border: 0; border-radius: .4rem; background: #2A4A6B; color: #fff;
    }
    /* Leaflet needs the map box to have a real height, or it draws nothing. This line is load-bearing. */
    #map { height: 400px; border: 1px solid #ece3cf; border-radius: .5rem; }
    #lost {
      margin: 1rem 0; padding: .6rem .9rem; background: #fff;
      border: 1px solid #ece3cf; border-radius: .5rem; color: #9a6a3c;
    }
    .message { background: #fbeee0; border: 1px solid #e7cda8; border-radius: .4rem; padding: .6rem .9rem; margin: 1rem 0; }
    .message small { display: block; margin-top: .35rem; color: #6b5b40; }
  </style>
</head>
<body>
  <h1>Drop the pins</h1>

  <p class="heads-up">Unlike the others, this lesson needs an internet connection — and that's
     exactly what it's about.</p>

  <p>Type a reference and see the places it names on a real map.</p>

  <div class="row">
    <input id="ref" value="Acts 17" aria-label="Bible reference">
    <button id="go">Show on map</button>
  </div>

  <div id="map"></div>
  <div id="lost" hidden></div>
  <div id="msg"></div>

  <script>
    // Where Concord lives. Change this only if Concord runs on another computer.
    const CONCORD = "http://localhost:8000";

    const input = document.getElementById("ref");
    const lostEl = document.getElementById("lost");
    const msgEl = document.getElementById("msg");

    // Create the map once. The "tiles" — the actual map images — stream from OpenStreetMap
    // over the internet as you pan and zoom. That's the part that makes this lesson go online.
    const map = L.map("map").setView([39, 22], 5); // a calm starting view over the Mediterranean
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // All our pins live in one group so we can clear them between lookups.
    const pins = L.layerGroup().addTo(map);

    function message(text, hint) {
      msgEl.innerHTML = "";
      if (!text) return;
      const box = document.createElement("div");
      box.className = "message";
      box.textContent = text;
      if (hint) {
        const small = document.createElement("small");
        small.textContent = hint;
        box.appendChild(small);
      }
      msgEl.appendChild(box);
    }

    async function lookUp(ref) {
      message("");           // clear any old message
      let res;
      try {
        res = await fetch(`${CONCORD}/v1/verses/${encodeURIComponent(ref)}/places`);
      } catch (e) {
        return message("Couldn't reach Concord — is it running?",
                       "Check " + CONCORD + "/healthz in your browser.");
      }
      const data = await res.json();
      if (!res.ok) {
        const said = data.error && data.error.message ? "Concord said: " + data.error.message : "";
        return message("Hmm — couldn't find that. Try something like Acts 17.", said);
      }

      pins.clearLayers();
      lostEl.hidden = true;
      lostEl.textContent = "";

      if (data.total === 0) {
        return message("No places to map here — this verse is about an idea, not a location.");
      }

      // Split the places: the ones Concord can locate vs. the ones it honestly can't.
      const located = data.places.filter((p) => p.latitude !== null && p.longitude !== null);
      const lost = data.places.filter((p) => p.latitude === null || p.longitude === null);

      // Drop a pin for each located place and zoom the map to fit them all.
      const points = [];
      for (const p of located) {
        const marker = L.marker([p.latitude, p.longitude]);
        marker.bindPopup(p.type ? `${p.name} (${p.type})` : p.name);
        marker.addTo(pins);
        points.push([p.latitude, p.longitude]);
      }
      if (points.length === 1) map.setView(points[0], 9);
      else if (points.length > 1) map.fitBounds(points, { padding: [30, 30] });

      // The honest part: places whose location is lost get NO pin — Concord won't invent one,
      // so we can't either. We name them below the map instead.
      if (lost.length > 0) {
        lostEl.hidden = false;
        lostEl.textContent =
          "Also named in this passage, but their location is lost to history, so they're not on the map: " +
          lost.map((p) => p.name).join(", ") + ".";
      }

      if (located.length === 0) {
        message("None of the places named here can be placed on a map — see the note below.");
      }
    }

    document.getElementById("go").addEventListener("click", () => {
      const ref = input.value.trim();
      if (ref) lookUp(ref);
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { const ref = input.value.trim(); if (ref) lookUp(ref); }
    });
  </script>
</body>
</html>
