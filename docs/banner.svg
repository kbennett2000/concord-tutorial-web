<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Concord — now build with it.</title>
  <desc>Banner concept for concord-tutorial-web, a sibling to Concord's banner: the wordmark "Concord" set in a warm indigo serif on a warm cream background, with a small blueprint-style line drawing of ancient lashed-timber scaffolding centered above (a green leaf resting on its platform), and the italic tagline "now build with it." centered below.</desc>

  <rect width="1280" height="320" fill="#F5ECDB"/>

  <g transform="translate(640,65) scale(0.82)" fill="none" stroke="#2A4A6B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- scaffold structure: lashed-timber, blueprint line-art -->
    <line x1="-30" y1="-22" x2="30" y2="-22"/>   <!-- top working platform -->
    <line x1="-26" y1="26"  x2="-22" y2="-22"/>  <!-- left leg -->
    <line x1="26"  y1="26"  x2="22"  y2="-22"/>  <!-- right leg -->
    <line x1="-24" y1="4"   x2="24"  y2="4"/>    <!-- lower rail -->
    <line x1="-22" y1="4"   x2="22"  y2="-22"/>  <!-- cross-brace -->
    <line x1="22"  y1="4"   x2="-22" y2="-22"/>  <!-- cross-brace -->
    <line x1="-31" y1="26"  x2="-21" y2="26"/>   <!-- left foot -->
    <line x1="21"  y1="26"  x2="31"  y2="26"/>   <!-- right foot -->
    <!-- rope lashings at the top joints -->
    <g stroke="#4F6A85" stroke-width="1.6">
      <line x1="-27" y1="-19" x2="-17" y2="-19"/>
      <line x1="-27" y1="-16" x2="-17" y2="-16"/>
      <line x1="17"  y1="-19" x2="27"  y2="-19"/>
      <line x1="17"  y1="-16" x2="27"  y2="-16"/>
    </g>
    <!-- the growing thing: Concord's leaf, resting on the platform -->
    <path d="M 0 -22 Q -7 -31 0 -40 Q 7 -31 0 -22 Z" fill="#4A6B3C" stroke="none"/>
  </g>

  <text x="640" y="220" text-anchor="middle"
        font-family="'EB Garamond', 'Cormorant Garamond', Garamond, Georgia, 'Times New Roman', serif"
        font-size="130" fill="#2A4A6B" font-weight="500" letter-spacing="3">Concord</text>

  <text x="640" y="266" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" fill="#4F6A85" font-style="italic" letter-spacing="3">now build with it.</text>
</svg>
